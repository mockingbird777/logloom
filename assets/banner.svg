<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">LogLoom — private log intelligence</title>
  <desc id="desc">A dark indigo banner with woven cyan and violet log streams forming a signal chart.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101d"/>
      <stop offset=".52" stop-color="#0c1730"/>
      <stop offset="1" stop-color="#111126"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#55d7d0"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#55d7d0" stop-opacity=".28"/>
      <stop offset="1" stop-color="#55d7d0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".38"/></filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0v36" fill="none" stroke="#a9badb" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)"/>
  <circle cx="940" cy="95" r="210" fill="url(#glow)" filter="url(#blur)"/>
  <g transform="translate(65 65)" filter="url(#shadow)">
    <rect width="94" height="94" rx="25" fill="url(#thread)"/>
    <path d="M25 23v46c0 9 6 14 16 14h30M39 23v38c0 6 4 9 10 9h22M53 23v26c0 5 3 7 8 7h10" fill="none" stroke="#07101d" stroke-width="7" stroke-linecap="round"/>
  </g>
  <text x="65" y="224" fill="#f0f5ff" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="66" font-weight="760" letter-spacing="-2">LogLoom</text>
  <text x="68" y="268" fill="#9dacc7" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="21" letter-spacing="1">PRIVATE LOG INTELLIGENCE, WOVEN LOCALLY.</text>
  <g transform="translate(690 66)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 190C45 185 49 151 93 151s54 19 91 9 44-92 89-88 39 61 81 53 50-112 96-113" stroke="#55d7d0" stroke-width="5"/>
    <path d="M0 207c47 0 55-27 91-20s55 40 94 28 45-56 90-50 42 48 82 34 45-79 93-76" stroke="#a78bfa" stroke-width="3" stroke-opacity=".8"/>
    <path d="M0 229h450" stroke="#8393af" stroke-opacity=".2"/>
    <g fill="#55d7d0" stroke="none"><circle cx="93" cy="151" r="6"/><circle cx="273" cy="72" r="6"/><circle cx="450" cy="12" r="6"/></g>
    <g font-family="ui-monospace,SFMono-Regular,monospace" font-size="12" fill="#8191ad" stroke="none">
      <text x="5" y="35">redact → parse → cluster</text>
      <text x="305" y="250">100% offline</text>
    </g>
  </g>
</svg>
