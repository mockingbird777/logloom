  <g transform="translate(42 216)" filter="url(#shadow)" font-family="Inter,Segoe UI,sans-serif"><rect width="720" height="250" rx="15" fill="#0e1728" stroke="#26334a"/><text x="20" y="30" fill="#edf3ff" font-size="13" font-weight="700">Event &amp; error trend</text><text x="20" y="48" fill="#71809a" font-size="10">5 populated one-minute buckets</text><g transform="translate(48 68)"><path d="M0 150H640M0 100H640M0 50H640" stroke="#26334a"/><path d="M0 131L160 126L320 130L480 122L640 23L640 150L0 150Z" fill="#55d7d014"/><path d="M0 131L160 126L320 130L480 122L640 23" fill="none" stroke="#55d7d0" stroke-width="3"/><path d="M0 150L160 150L320 150L480 150L640 48" fill="none" stroke="#ff6b7a" stroke-width="3"/><circle cx="640" cy="23" r="6" fill="#55d7d0"/><circle cx="640" cy="48" r="6" fill="#ff6b7a"/><text x="0" y="171" fill="#71809a" font-size="9">08:00</text><text x="606" y="171" fill="#71809a" font-size="9">08:04</text></g></g>
