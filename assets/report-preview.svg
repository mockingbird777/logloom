    <g transform="translate(935)"><rect width="181" height="92" rx="14" fill="#111d31" stroke="#26334a"/><text x="16" y="30" fill="#91a0bb" font-size="10" letter-spacing="1">REDACTIONS</text><text x="16" y="64" fill="#5ee6a8" font-size="29" font-weight="750">3</text><text x="16" y="82" fill="#71809a" font-size="10">safe by default</text></g>
