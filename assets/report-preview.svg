    <g transform="translate(374)"><rect width="174" height="92" rx="14" fill="#111d31" stroke="#26334a"/><text x="16" y="30" fill="#91a0bb" font-size="10" letter-spacing="1">ANOMALIES</text><text x="16" y="64" fill="#ffca80" font-size="29" font-weight="750">2</text><text x="16" y="82" fill="#71809a" font-size="10">robust bucket signals</text></g>
    <g transform="translate(561)"><rect width="174" height="92" rx="14" fill="#111d31" stroke="#26334a"/><text x="16" y="30" fill="#91a0bb" font-size="10" letter-spacing="1">TEMPLATES</text><text x="16" y="64" fill="#edf3ff" font-size="29" font-weight="750">5</text><text x="16" y="82" fill="#71809a" font-size="10">streaming clusters</text></g>
