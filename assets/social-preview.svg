<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">LogLoom social preview</title>
  <desc id="desc">LogLoom turns local production logs into a private, searchable incident report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070b14"/><stop offset=".58" stop-color="#11192b"/><stop offset="1" stop-color="#16213a"/></linearGradient>
    <linearGradient id="brand" x2="1" y2="1"><stop stop-color="#55d7d0"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#55d7d0" stop-opacity=".24"/><stop offset="1" stop-color="#55d7d0" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="17" flood-opacity=".38"/></filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1070" cy="125" r="390" fill="url(#glow)"/>
  <g font-family="Inter,Segoe UI,sans-serif">
    <g transform="translate(72 70)"><rect width="50" height="50" rx="15" fill="url(#brand)"/><text x="25" y="35" fill="#071018" text-anchor="middle" font-size="25" font-weight="900">L</text><text x="68" y="35" fill="#55d7d0" font-size="18" font-weight="750" letter-spacing="3">LOGLOOM</text></g>
    <text x="72" y="226" fill="#f3f6ff" font-size="60" font-weight="760" letter-spacing="-3">Production log answers.</text>
    <text x="72" y="294" fill="#f3f6ff" font-size="60" font-weight="760" letter-spacing="-3">Without the upload.</text>
    <text x="76" y="350" fill="#a8b3c8" font-size="23">Templates · bursts · latency · safe-by-default redaction</text>
    <g transform="translate(72 494)" font-size="14" font-weight="700" letter-spacing="1.2"><rect width="135" height="42" rx="21" fill="#55d7d014" stroke="#55d7d066"/><text x="67.5" y="27" fill="#55d7d0" text-anchor="middle">LOCAL-FIRST</text><rect x="149" width="183" height="42" rx="21" fill="#a78bfa14" stroke="#a78bfa66"/><text x="240.5" y="27" fill="#c1b3ff" text-anchor="middle">STREAMING CLI</text><rect x="346" width="205" height="42" rx="21" fill="#ffffff08" stroke="#71809a66"/><text x="448.5" y="27" fill="#c8d1e0" text-anchor="middle">PORTABLE REPORT</text></g>
  </g>
  <g transform="translate(760 104)" filter="url(#shadow)" font-family="Inter,Segoe UI,sans-serif">
    <rect width="445" height="422" rx="26" fill="#0b1220e8" stroke="#33415b"/>
    <text x="26" y="39" fill="#91a0bb" font-size="11" font-weight="700" letter-spacing="1.3">INCIDENT SIGNAL</text>
    <g transform="translate(25 58)"><rect width="123" height="74" rx="13" fill="#111d31" stroke="#26334a"/><text x="15" y="31" fill="#ff6b7a" font-size="25" font-weight="750">6</text><text x="15" y="54" fill="#91a0bb" font-size="10" letter-spacing="1">ERRORS</text><rect x="135" width="123" height="74" rx="13" fill="#111d31" stroke="#26334a"/><text x="150" y="31" fill="#ffca80" font-size="25" font-weight="750">3</text><text x="150" y="54" fill="#91a0bb" font-size="10" letter-spacing="1">ANOMALIES</text><rect x="270" width="123" height="74" rx="13" fill="#111d31" stroke="#26334a"/><text x="285" y="31" fill="#55d7d0" font-size="25" font-weight="750">3</text><text x="285" y="54" fill="#91a0bb" font-size="10" letter-spacing="1">REDACTIONS</text></g>
    <g transform="translate(27 166)"><path d="M0 144H390M0 96H390M0 48H390" stroke="#26334a"/><path d="M0 130L92 126L186 128L281 121L390 30L390 144L0 144Z" fill="#55d7d019"/><path d="M0 130L92 126L186 128L281 121L390 30" fill="none" stroke="#55d7d0" stroke-width="4"/><path d="M0 144L92 144L186 144L281 144L390 55" fill="none" stroke="#ff6b7a" stroke-width="4"/><circle cx="390" cy="30" r="7" fill="#55d7d0"/><circle cx="390" cy="55" r="7" fill="#ff6b7a"/></g>
    <g transform="translate(25 341)"><rect width="395" height="55" rx="12" fill="#ff6b7a0d" stroke="#ff6b7a55"/><circle cx="23" cy="27" r="6" fill="#ff6b7a"/><text x="41" y="23" fill="#f4f7ff" font-size="13" font-weight="700">Latency regression detected</text><text x="41" y="41" fill="#91a0bb" font-size="11">p95 rose from 124 ms to 2.4 s</text></g>
  </g>
</svg>
